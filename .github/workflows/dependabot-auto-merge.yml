name: Dependabot Auto-Merge

# Policy:
#   - semver-patch and semver-minor  => auto-approve + squash auto-merge
#   - semver-major                   => leave for manual review
#
# GitHub's branch protection / required status checks still gate the
# actual merge; `gh pr merge --auto` just queues the PR so it flips to
# merged as soon as CI is green (and stays open with no action otherwise).
#
# This exists because Dependabot's "rebase" behavior alone led to the
# closed-not-merged pile we saw on the first batch of PRs (#3–#11): they
# were closed when the branch went stale rather than merging after CI.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    name: Auto-merge dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve patch + minor bumps
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable squash auto-merge for patch + minor bumps
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major bumps (manual review)
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body \
            "🔍 Major version bump detected (**${{ steps.metadata.outputs.dependency-names }}**). Auto-merge is disabled; please review changelogs and merge manually."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
