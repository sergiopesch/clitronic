name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs for the same ref. Keeps dev loops fast and saves
# minutes: if you push three times to a PR in a row, only the last run
# actually finishes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege. Individual jobs can opt-in to more if
# they ever need it (none of these do right now).
permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Validate
        run: npm run validate

      - name: Test
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build
        run: npm run build

  cli:
    name: CLI Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          # The CLI lives in /cli with its own lockfile. Scoping the cache
          # to that lockfile means cached deps stay warm across runs
          # instead of invalidating on every root-lockfile change.
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci --prefer-offline --no-audit

      - name: Audit CLI production dependencies
        working-directory: cli
        run: npm run audit:prod

      - name: Type-check CLI
        working-directory: cli
        run: npm run type-check

      - name: Test CLI
        working-directory: cli
        run: npm test

      - name: Verify CLI loads
        working-directory: cli
        run: npm run start -- --help
