<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Circuit traces -->
  <g fill="none" stroke="url(#c)" stroke-width="2" stroke-linecap="round">
    <path d="M4 16 H10"/>
    <path d="M22 16 H28"/>
    <path d="M16 4 V10"/>
    <path d="M16 22 V28"/>
  </g>

  <!-- Central chip -->
  <rect x="10" y="10" width="12" height="12" rx="2" fill="#0d1117" stroke="url(#c)" stroke-width="1.5"/>

  <!-- Chip pins -->
  <g fill="url(#c)">
    <rect x="12" y="8" width="2" height="3"/>
    <rect x="18" y="8" width="2" height="3"/>
    <rect x="12" y="21" width="2" height="3"/>
    <rect x="18" y="21" width="2" height="3"/>
    <rect x="8" y="12" width="3" height="2"/>
    <rect x="8" y="18" width="3" height="2"/>
    <rect x="21" y="12" width="3" height="2"/>
    <rect x="21" y="18" width="3" height="2"/>
  </g>

  <!-- Dot marker -->
  <circle cx="13" cy="13" r="1.5" fill="url(#c)" opacity="0.6"/>

  <!-- Connection nodes -->
  <g fill="url(#c)">
    <circle cx="4" cy="16" r="2"/>
    <circle cx="28" cy="16" r="2"/>
    <circle cx="16" cy="4" r="2"/>
    <circle cx="16" cy="28" r="2"/>
  </g>
</svg>
