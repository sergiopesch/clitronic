<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- Circuit traces -->
  <g fill="none" stroke="url(#c)" stroke-width="6" stroke-linecap="round">
    <path d="M25 90 H55"/>
    <path d="M125 90 H155"/>
    <path d="M90 25 V55"/>
    <path d="M90 125 V155"/>
  </g>

  <!-- Central chip -->
  <rect x="55" y="55" width="70" height="70" rx="8" fill="#0d1117" stroke="url(#c)" stroke-width="4"/>

  <!-- Chip pins -->
  <g fill="url(#c)">
    <rect x="68" y="45" width="10" height="14" rx="1"/>
    <rect x="102" y="45" width="10" height="14" rx="1"/>
    <rect x="68" y="121" width="10" height="14" rx="1"/>
    <rect x="102" y="121" width="10" height="14" rx="1"/>
    <rect x="45" y="68" width="14" height="10" rx="1"/>
    <rect x="45" y="102" width="14" height="10" rx="1"/>
    <rect x="121" y="68" width="14" height="10" rx="1"/>
    <rect x="121" y="102" width="14" height="10" rx="1"/>
  </g>

  <!-- Dot marker -->
  <circle cx="72" cy="72" r="6" fill="url(#c)" opacity="0.6"/>

  <!-- Connection nodes -->
  <g fill="url(#c)">
    <circle cx="25" cy="90" r="8"/>
    <circle cx="155" cy="90" r="8"/>
    <circle cx="90" cy="25" r="8"/>
    <circle cx="90" cy="155" r="8"/>
  </g>
</svg>
